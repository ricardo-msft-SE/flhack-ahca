title: Project Management Buddy
description: >-
  High-level architectural design for a Project Management Buddy app built on
  Microsoft Azure AI Foundry and Azure AI Services using a multi-agent approach.
url: "https://ricardo-msft-SE.github.io"
baseurl: "/flhack-ahca"

remote_theme: just-the-docs/just-the-docs@v0.10.2

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# ─── Just the Docs theme settings ───────────────────────────────────────────

color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Mermaid diagram support
mermaid:
  version: "10.9.0"

# Back-to-top button
back_to_top: true
back_to_top_text: "Back to top"

# External links in header
aux_links:
  "GitHub Repo":
    - "https://github.com/ricardo-msft-SE/flhack-ahca"
aux_links_new_tab: true

# Heading anchors for deep-linking
heading_anchors: true

# Sort nav items by front-matter nav_order
nav_sort: order

# Footer
footer_content: >-
  Copyright &copy; 2025 Project Management Buddy.
  Documentation built with <a href="https://just-the-docs.com">Just the Docs</a>.

# Callout styles
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ─── Kramdown / syntax highlighting ─────────────────────────────────────────
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ─── Build settings ──────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .git
  - README.md
