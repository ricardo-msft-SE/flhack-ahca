name: Deploy Docs (Jekyll)

on:
  push:
    branches: [main]
    paths:
      - "policybot/**"
      - "pmbuddy/**"
      - "index.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby for Policy Bot
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: policybot

      - name: Setup Ruby for PM Buddy
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: pmbuddy

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Policy Bot with Jekyll
        working-directory: policybot
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}/policybot"
        env:
          JEKYLL_ENV: production

      - name: Build PM Buddy with Jekyll
        working-directory: pmbuddy
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}/pmbuddy"
        env:
          JEKYLL_ENV: production

      - name: Prepare multi-docs artifact root
        run: |
          rm -rf _site_wrapped
          mkdir -p _site_wrapped/policybot
          mkdir -p _site_wrapped/pmbuddy
          cp -R policybot/_site/. _site_wrapped/policybot/
          cp -R pmbuddy/_site/. _site_wrapped/pmbuddy/
          cp index.html _site_wrapped/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_wrapped

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
