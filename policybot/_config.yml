title: "Policy Bot — Architectural Design"
description: "High-level design guide for the AHCA Policy Bot using Microsoft Azure AI Foundry, multi-agent orchestration, and Azure AI Services."
baseurl: "/flhack-ahca/policybot"
url: "https://ricardo-msft-se.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

# Just the Docs configuration
color_scheme: default
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

footer_content: >
  Policy Bot Architectural Design Guide · Built with
  <a href="https://jekyllrb.com">Jekyll</a> &amp;
  <a href="https://just-the-docs.com">Just the Docs</a>.
  Powered by <a href="https://azure.microsoft.com/en-us/products/ai-foundry">Azure AI Foundry</a>.

# Navigation
nav_sort: order  # 'order' respects nav_order; 'case_insensitive' sorts alphabetically

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Code copy button
enable_copy_code_button: true

# Mermaid diagrams
mermaid:
  version: "11"

# Aux links (top right nav)
aux_links:
  "GitHub Repo":
    - "https://github.com/ricardo-msft-SE/flhack-ahca"
  "Azure AI Foundry":
    - "https://ai.azure.com"
aux_links_new_tab: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: true

permalink: pretty
