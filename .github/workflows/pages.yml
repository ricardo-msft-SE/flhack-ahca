name: Deploy Policy Bot Docs (Jekyll)

on:
  push:
    branches: [main]
    paths:
      - "policybot/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: policybot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: policybot

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}/policybot"
        env:
          JEKYLL_ENV: production

      - name: Prepare /policybot artifact root
        run: |
          rm -rf _site_wrapped
          mkdir -p _site_wrapped/policybot
          cp -R _site/. _site_wrapped/policybot/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: policybot/_site_wrapped

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
