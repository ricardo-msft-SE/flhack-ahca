title: "Project Management Buddy — Architectural Design"
description: "High-level architecture for a transcript-driven project management assistant using Azure AI Foundry, Foundry IQ, Agent Framework, and Azure AI Services."
baseurl: "/flhack-ahca/pmbuddy"
url: "https://ricardo-msft-se.github.io"

theme: just-the-docs

color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

footer_content: >
  Project Management Buddy Design Guide · Built with
  <a href="https://jekyllrb.com">Jekyll</a> &amp;
  <a href="https://just-the-docs.com">Just the Docs</a>.
  Powered by <a href="https://azure.microsoft.com/en-us/products/ai-foundry">Azure AI Foundry</a>.

nav_sort: order

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

enable_copy_code_button: true

mermaid:
  version: "11"

aux_links:
  "GitHub Repo":
    - "https://github.com/ricardo-msft-SE/flhack-ahca"
  "Azure AI Foundry":
    - "https://ai.azure.com"
aux_links_new_tab: true

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: true

permalink: pretty
